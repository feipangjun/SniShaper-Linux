name: build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        shell: pwsh
        working-directory: frontend
        run: npm ci

      - name: Build application
        shell: pwsh
        run: |
          Set-Location frontend
          npm run build
          Set-Location ..
          New-Item -ItemType Directory -Path build/bin -Force | Out-Null
          go build -ldflags="-H windowsgui" -o build/bin/snishaper.exe .

      - name: Package bundle
        shell: pwsh
        run: |
          if ("${{ github.ref }}".StartsWith("refs/tags/")) {
            $archiveName = "snishaper-${{ github.ref_name }}-windows-amd64.zip"
          } else {
            $archiveName = "snishaper-windows-amd64.zip"
          }

          $bundleDir = Join-Path $env:RUNNER_TEMP "snishaper-windows-amd64"
          $rulesDir = Join-Path $bundleDir "rules"
          $proxyDir = Join-Path $bundleDir "proxy"
          New-Item -ItemType Directory -Path $rulesDir -Force | Out-Null
          New-Item -ItemType Directory -Path $proxyDir -Force | Out-Null
          Copy-Item build/bin/snishaper.exe $bundleDir
          Copy-Item rules/config.json $rulesDir
          if (Test-Path proxy/config.json) {
            Copy-Item proxy/config.json $proxyDir
          }
          Compress-Archive -Path "$bundleDir\\*" -DestinationPath (Join-Path "build/bin" $archiveName) -Force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snishaper-windows-amd64
          path: build/bin/*.zip
          if-no-files-found: error

