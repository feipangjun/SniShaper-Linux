name: Build SniShaper Linux

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Linux amd64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: go.sum

      - name: Show Go version
        run: go version

      - name: Download Go dependencies
        run: go mod download

      - name: Prepare embedded web files
        run: |
          mkdir -p web/dist
          if [ ! -f web/dist/index.html ]; then
            cat > web/dist/index.html <<'EOF'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>SniShaper CLI</title>
            </head>
            <body>
              <h1>SniShaper CLI</h1>
            </body>
          </html>
          EOF
          fi

      - name: Prepare package directory
        run: |
          rm -rf dist
          mkdir -p dist/package

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -trimpath -ldflags="-s -w" -o dist/package/snishaper .
          chmod +x dist/package/snishaper

      - name: Copy rules
        run: |
          if [ -d rules ]; then
            cp -r rules dist/package/rules
          fi

      - name: Copy docs
        run: |
          if [ -f README.md ]; then
            cp README.md dist/package/README.md
          fi

          if [ -f LICENSE ]; then
            cp LICENSE dist/package/LICENSE
          fi

      - name: Test binary
        run: |
          ./dist/package/snishaper --help || true
          ./dist/package/snishaper --version || true

      - name: Create archive
        run: |
          cd dist/package
          tar -czf ../snishaper-linux-amd64.tar.gz .
          cd ../..
          sha256sum dist/snishaper-linux-amd64.tar.gz > dist/snishaper-linux-amd64.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: snishaper-linux-amd64
          path: |
            dist/snishaper-linux-amd64.tar.gz
            dist/snishaper-linux-amd64.tar.gz.sha256
