name: Build SniShaper Linux

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Linux amd64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: |
          cd web
          npm install

      - name: Build web frontend
        run: |
          cd web
          npm run build

      - name: Check web build output
        run: |
          if [ ! -d web/dist ]; then
            echo "web/dist not found"
            exit 1
          fi

          if [ -z "$(ls -A web/dist)" ]; then
            echo "web/dist is empty"
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: go.sum

      - name: Show versions
        run: |
          node --version
          npm --version
          go version

      - name: Download Go dependencies
        run: go mod download

      - name: Build Go binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -trimpath -ldflags="-s -w" -o snishaper .
          chmod +x snishaper

      - name: Prepare package
        run: |
          rm -rf dist
          mkdir -p dist/package

          cp snishaper dist/package/snishaper

          if [ -d rules ]; then
            cp -r rules dist/package/rules
          fi

          if [ -f README.md ]; then
            cp README.md dist/package/README.md
          fi

          if [ -f LICENSE ]; then
            cp LICENSE dist/package/LICENSE
          fi

      - name: Test binary
        run: |
          ./dist/package/snishaper --help || true
          ./dist/package/snishaper --version || true

      - name: Create archive
        run: |
          cd dist/package
          tar -czf ../snishaper-linux-amd64.tar.gz .
          cd ../..
          sha256sum dist/snishaper-linux-amd64.tar.gz > dist/snishaper-linux-amd64.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: snishaper-linux-amd64
          path: |
            dist/snishaper-linux-amd64.tar.gz
            dist/snishaper-linux-amd64.tar.gz.sha256
