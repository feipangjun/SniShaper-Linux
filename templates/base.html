{{define "base"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - SniShaper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js" defer></script>
</head>
<body>
    <div class="lang-switcher">
        <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
        <button class="lang-btn" id="btn-zh" onclick="setLang('zh')">中</button>
    </div>
    
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="/logo.png" alt="SniShaper" class="sidebar-logo-img">
            <h2>SniShaper</h2>
            <p id="sidebar-subtitle" data-i18n="sidebar.subtitle">Cloudflare IP Shaper</p>
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard" class="sidebar-item" id="sidebar-dashboard">
                <span class="iconify" data-icon="ph:activity-bold"></span>
                <span data-i18n="sidebar.dashboard">控制面板</span>
            </a>
            <a href="/proxies" class="sidebar-item" id="sidebar-proxies">
                <span class="iconify" data-icon="ph:globe-bold"></span>
                <span data-i18n="sidebar.proxies">代理节点</span>
            </a>
            <a href="/rules" class="sidebar-item" id="sidebar-rules">
                <span class="iconify" data-icon="ph:shield-check-bold"></span>
                <span data-i18n="sidebar.rules">分流规则</span>
            </a>
            <a href="/routing" class="sidebar-item" id="sidebar-routing">
                <span class="iconify" data-icon="ph:shuffle-bold"></span>
                <span data-i18n="sidebar.routing">自动分流</span>
            </a>
            <a href="/dns" class="sidebar-item" id="sidebar-dns">
                <span class="iconify" data-icon="ph:antenna-bold"></span>
                <span data-i18n="sidebar.dns">DNS 设置</span>
            </a>
            <a href="/logs" class="sidebar-item" id="sidebar-logs">
                <span class="iconify" data-icon="ph:file-text-bold"></span>
                <span data-i18n="sidebar.logs">系统日志</span>
            </a>
            <a href="/settings" class="sidebar-item" id="sidebar-settings">
                <span class="iconify" data-icon="ph:gear-bold"></span>
                <span data-i18n="sidebar.settings">设置</span>
            </a>
        </nav>
    </aside>
    
    <div class="main-content">
        {{template "content" .}}
    </div>
    
    <script>
        let currentLang = 'en';
        
        const sidebarI18n = {
            en: {
                'sidebar.subtitle': 'Cloudflare IP Shaper',
                'sidebar.dashboard': 'Dashboard',
                'sidebar.proxies': 'Proxies',
                'sidebar.rules': 'Rules',
                'sidebar.routing': 'Routing',
                'sidebar.dns': 'DNS',
                'sidebar.logs': 'Logs',
                'sidebar.settings': 'Settings'
            },
            zh: {
                'sidebar.subtitle': 'Cloudflare IP 整形器',
                'sidebar.dashboard': '控制面板',
                'sidebar.proxies': '代理节点',
                'sidebar.rules': '分流规则',
                'sidebar.routing': '自动分流',
                'sidebar.dns': 'DNS 设置',
                'sidebar.logs': '系统日志',
                'sidebar.settings': '设置'
            }
        };
        
        function updateSidebarLang() {
            const translations = sidebarI18n[currentLang] || sidebarI18n.en;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[key]) {
                    el.textContent = translations[key];
                }
            });
        }
        
        function setLang(lang) {
            fetch('/lang?l=' + lang, {method: 'POST'}).then(() => {
                currentLang = lang;
                localStorage.setItem('snishaper-lang', lang);
                updateSidebarLang();
                if (typeof updateUI === 'function') updateUI();
            });
        }
        
        function initLang() {
            const savedLang = localStorage.getItem('snishaper-lang');
            if (savedLang) {
                currentLang = savedLang;
                fetch('/lang?l=' + savedLang, {method: 'POST'}).then(() => {
                    updateSidebarLang();
                    if (typeof updateUI === 'function') updateUI();
                    if (typeof initPage === 'function') initPage();
                });
            } else {
                fetch('/lang').then(r => r.text()).then(lang => {
                    currentLang = lang || 'en';
                    updateSidebarLang();
                    if (typeof updateUI === 'function') updateUI();
                    if (typeof initPage === 'function') initPage();
                });
            }
        }
        
        function highlightSidebar() {
            const path = window.location.pathname;
            document.querySelectorAll('.sidebar-item').forEach(item => {
                item.classList.remove('active');
            });
            const activeItem = document.querySelector(`.sidebar-item[href="${path}"]`);
            if (activeItem) {
                activeItem.classList.add('active');
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            initLang();
            highlightSidebar();
        });
    </script>
    {{template "scripts" .}}
</body>
</html>
{{end}}
