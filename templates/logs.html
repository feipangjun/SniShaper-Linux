{{define "content"}}
<a href="/" class="back-link">
    <span class="iconify" data-icon="ph:caret-left-bold"></span>
    <span id="back-text">Back</span>
</a>

<h1 id="page-title">System Logs</h1>

<div class="toolbar">
    <button class="btn-sci secondary" onclick="loadLogs()" id="refresh-btn">
        <span class="iconify" data-icon="ph:arrows-clockwise-bold"></span>
        <span id="refresh-text">Refresh</span>
    </button>
    <button class="btn-sci secondary" onclick="copyLogs()" id="copy-btn">
        <span class="iconify" data-icon="ph:copy-bold"></span>
        <span id="copy-text">Copy All</span>
    </button>
</div>

<div class="card" style="padding: 0; overflow: hidden;">
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: rgba(255, 140, 0, 0.05); border-bottom: 1px solid var(--border);">
        <span id="recent-label" style="font-family: 'Orbitron', monospace; font-size: 0.8rem; color: var(--accent-orange); text-transform: uppercase; letter-spacing: 0.1em;">Recent Logs</span>
        <span style="font-size: 0.8rem; color: var(--text-secondary);">Auto-refresh: Off</span>
    </div>
    <div id="log-content" style="padding: 24px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; line-height: 1.8; max-height: 600px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; color: var(--text-secondary);">Loading...</div>
</div>
{{end}}

{{define "scripts"}}
<script>
    const i18n = {
        en: {
            back: "Back",
            title: "System Logs",
            refresh: "Refresh",
            copy: "Copy All",
            recent: "Recent Logs",
            loading: "Loading...",
            copied: "Copied to clipboard!"
        },
        zh: {
            back: "返回",
            title: "系统日志",
            refresh: "刷新",
            copy: "复制全部",
            recent: "最近日志",
            loading: "加载中...",
            copied: "已复制到剪贴板！"
        }
    };

    function updateUI() {
        const t = i18n[currentLang];
        document.getElementById('back-text').textContent = t.back;
        document.getElementById('page-title').textContent = t.title;
        document.getElementById('refresh-text').textContent = t.refresh;
        document.getElementById('copy-text').textContent = t.copy;
        document.getElementById('recent-label').textContent = t.recent;
        document.getElementById('btn-en').className = 'lang-btn' + (currentLang === 'en' ? ' active' : '');
        document.getElementById('btn-zh').className = 'lang-btn' + (currentLang === 'zh' ? ' active' : '');
    }

    function loadLogs() {
        const t = i18n[currentLang];
        document.getElementById('log-content').textContent = t.loading;
        fetch('/logs', {headers: {'Accept': 'application/json'}})
            .then(r => r.json())
            .then(data => {
                document.getElementById('log-content').textContent = data.logs ? data.logs.join('\n') : 'No logs';
            })
            .catch(() => {
                document.getElementById('log-content').textContent = 'Failed to load logs';
            });
    }

    function copyLogs() {
        const content = document.getElementById('log-content').textContent;
        navigator.clipboard.writeText(content).then(() => {
            const t = i18n[currentLang];
            alert(t.copied);
        });
    }

    function initPage() {
        loadLogs();
    }
</script>
{{end}}
