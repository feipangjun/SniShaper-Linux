{{define "content"}}
<a href="/rules" class="back-link">
    <span class="iconify" data-icon="ph:caret-left-bold"></span>
    <span id="back-text">Back</span>
</a>

<h1 id="page-title">Edit Rule</h1>

<form id="rule-form">
    <!-- Basic Info -->
    <div class="card">
        <div class="card-title" id="section-basic">Basic Information</div>
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label" id="label-name">Name *</label>
                <input type="text" class="form-input" id="name" required placeholder="Rule name">
            </div>
            <div class="form-group">
                <label class="form-label" id="label-website">Website</label>
                <input type="text" class="form-input" id="website" placeholder="example.com">
            </div>
        </div>
        <div class="form-group" style="margin-top: 16px;">
            <label class="form-label" id="label-mode">Proxy Mode</label>
            <select class="form-select" id="mode">
                <option value="mitm">MITM - Modify SNI/Inject ECH</option>
                <option value="server">Server - Local TLS Server</option>
                <option value="tls-rf">TLS-RF - TLS Record Fragment</option>
                <option value="quic">QUIC - HTTP/3 Support</option>
                <option value="transparent">Transparent - Transparent Proxy</option>
            </select>
        </div>
        <div class="form-group" style="margin-top: 16px;">
            <label class="form-checkbox">
                <input type="checkbox" id="enabled" checked>
                <span id="label-enabled">Enabled</span>
            </label>
        </div>
    </div>

    <!-- Domains -->
    <div class="card">
        <div class="card-title" id="section-domains">Domain Configuration</div>
        <div class="form-group">
            <label class="form-label" id="label-domains">Domains (one per line, supports wildcards)</label>
            <textarea class="form-textarea" id="domains" rows="4" placeholder="example.com&#10;*.example.com&#10;*.google.com"></textarea>
        </div>
    </div>

    <!-- Upstream -->
    <div class="card">
        <div class="card-title" id="section-upstream">Upstream Configuration</div>
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label" id="label-upstream">Upstream Proxy</label>
                <input type="text" class="form-input" id="upstream" placeholder="direct or http://proxy:port">
            </div>
            <div class="form-group">
                <label class="form-label" id="label-dns">DNS Mode</label>
                <select class="form-select" id="dns_mode">
                    <option value="">Default</option>
                    <option value="prefer_ipv4">Prefer IPv4</option>
                    <option value="prefer_ipv6">Prefer IPv6</option>
                    <option value="ipv4_only">IPv4 Only</option>
                    <option value="ipv6_only">IPv6 Only</option>
                </select>
            </div>
        </div>
    </div>

    <!-- SNI Settings -->
    <div class="card" id="sni-card">
        <div class="card-title" id="section-sni">SNI Configuration</div>
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label" id="label-sni-fake">SNI Fake Domain</label>
                <input type="text" class="form-input" id="sni_fake" placeholder="www.example.com">
            </div>
            <div class="form-group">
                <label class="form-label" id="label-sni-policy">SNI Policy</label>
                <select class="form-select" id="sni_policy">
                    <option value="">Default</option>
                    <option value="random">Random</option>
                    <option value="preserve">Preserve</option>
                    <option value="disable">Disable</option>
                </select>
            </div>
        </div>
    </div>

    <!-- ECH Settings -->
    <div class="card" id="ech-card">
        <div class="card-title" id="section-ech">ECH Configuration</div>
        <div class="form-group">
            <label class="form-checkbox">
                <input type="checkbox" id="ech_enabled">
                <span id="label-ech-enabled">Enable ECH</span>
            </label>
        </div>
        <div id="ech-config" style="display: none; margin-top: 16px;">
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" id="label-ech-profile">ECH Profile ID</label>
                    <select class="form-select" id="ech_profile_id">
                        <option value="">Select Profile...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" id="label-ech-domain">ECH Domain</label>
                    <input type="text" class="form-input" id="ech_domain" placeholder="crypto.cloudflare.com">
                </div>
            </div>
        </div>
    </div>

    <!-- Cloudflare Pool -->
    <div class="card">
        <div class="card-title" id="section-cf">Cloudflare Configuration</div>
        <div class="form-group">
            <label class="form-checkbox">
                <input type="checkbox" id="use_cf_pool">
                <span id="label-use-cf">Use Cloudflare IP Pool</span>
            </label>
        </div>
    </div>

    <!-- Certificate Verification -->
    <div class="card" id="cert-card">
        <div class="card-title" id="section-cert">Certificate Verification</div>
        <div class="form-group">
            <label class="form-label" id="label-cert-mode">Verification Mode</label>
            <select class="form-select" id="cert_verify_mode">
                <option value="">Default (System)</option>
                <option value="strict_real">Strict Real</option>
                <option value="allow_names">Allow Names</option>
                <option value="allow_suffixes">Allow Suffixes</option>
                <option value="allow_spki">Allow SPKI</option>
                <option value="chain_only">Chain Only</option>
            </select>
        </div>
        <div id="cert-config" style="display: none; margin-top: 16px;">
            <div class="form-group" id="cert-names-group">
                <label class="form-label" id="label-cert-names">Allowed Names (one per line)</label>
                <textarea class="form-textarea" id="cert_names" rows="3" placeholder="example.com"></textarea>
            </div>
            <div class="form-group" id="cert-suffixes-group">
                <label class="form-label" id="label-cert-suffixes">Allowed Suffixes (one per line)</label>
                <textarea class="form-textarea" id="cert_suffixes" rows="3" placeholder=".example.com"></textarea>
            </div>
            <div class="form-group" id="cert-spki-group">
                <label class="form-label" id="label-cert-spki">Allowed SPKI SHA256 (one per line)</label>
                <textarea class="form-textarea" id="cert_spki" rows="3" placeholder="sha256/base64..."></textarea>
            </div>
            <div class="form-group">
                <label class="form-checkbox">
                    <input type="checkbox" id="cert_allow_unknown">
                    <span id="label-cert-unknown">Allow Unknown Authority</span>
                </label>
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="toolbar">
        <button type="submit" class="btn-sci" id="btn-save">
            <span class="iconify" data-icon="ph:floppy-disk-bold"></span>
            <span>Save</span>
        </button>
        <button type="button" class="btn-sci secondary" onclick="history.back()" id="btn-cancel">
            <span class="iconify" data-icon="ph:x-bold"></span>
            <span>Cancel</span>
        </button>
    </div>
</form>
{{end}}

{{define "scripts"}}
<script>
    const i18n = {
        en: {
            back: "Back",
            title: "Edit Rule",
            basicInfo: "Basic Information",
            name: "Name *",
            website: "Website",
            mode: "Proxy Mode",
            enabled: "Enabled",
            domains: "Domain Configuration",
            domainsLabel: "Domains (one per line, supports wildcards)",
            upstream: "Upstream Configuration",
            upstreamLabel: "Upstream Proxy",
            dns: "DNS Mode",
            sni: "SNI Configuration",
            sniFake: "SNI Fake Domain",
            sniPolicy: "SNI Policy",
            ech: "ECH Configuration",
            echEnabled: "Enable ECH",
            echProfile: "ECH Profile ID",
            echDomain: "ECH Domain",
            cf: "Cloudflare Configuration",
            useCf: "Use Cloudflare IP Pool",
            cert: "Certificate Verification",
            certMode: "Verification Mode",
            certNames: "Allowed Names (one per line)",
            certSuffixes: "Allowed Suffixes (one per line)",
            certSpki: "Allowed SPKI SHA256 (one per line)",
            certUnknown: "Allow Unknown Authority",
            save: "Save",
            cancel: "Cancel",
            modeMitm: "MITM - Modify SNI/Inject ECH",
            modeServer: "Server - Local TLS Server",
            modeTlsRf: "TLS-RF - TLS Record Fragment",
            modeQuic: "QUIC - HTTP/3 Support",
            modeTransparent: "Transparent - Transparent Proxy",
            dnsDefault: "Default",
            dnsPrefer4: "Prefer IPv4",
            dnsPrefer6: "Prefer IPv6",
            dns4Only: "IPv4 Only",
            dns6Only: "IPv6 Only",
            sniDefault: "Default",
            sniRandom: "Random",
            sniPreserve: "Preserve",
            sniDisable: "Disable",
            certDefault: "Default (System)",
            certStrict: "Strict Real",
            certNames: "Allow Names",
            certSuffixes: "Allow Suffixes",
            certSpki: "Allow SPKI",
            certChain: "Chain Only"
        },
        zh: {
            back: "返回",
            title: "编辑规则",
            basicInfo: "基本信息",
            name: "名称 *",
            website: "网站",
            mode: "代理模式",
            enabled: "已启用",
            domains: "域名配置",
            domainsLabel: "域名（每行一个，支持通配符）",
            upstream: "上游配置",
            upstreamLabel: "上游代理",
            dns: "DNS模式",
            sni: "SNI配置",
            sniFake: "SNI伪装域名",
            sniPolicy: "SNI策略",
            ech: "ECH配置",
            echEnabled: "启用ECH",
            echProfile: "ECH配置文件",
            echDomain: "ECH域名",
            cf: "Cloudflare配置",
            useCf: "使用Cloudflare IP池",
            cert: "证书验证",
            certMode: "验证模式",
            certNames: "允许的域名（每行一个）",
            certSuffixes: "允许的后缀（每行一个）",
            certSpki: "允许的SPKI SHA256（每行一个）",
            certUnknown: "允许未知颁发机构",
            save: "保存",
            cancel: "取消",
            modeMitm: "MITM - 修改SNI/注入ECH",
            modeServer: "Server - 本地TLS服务器",
            modeTlsRf: "TLS-RF - TLS记录分片",
            modeQuic: "QUIC - HTTP/3支持",
            modeTransparent: "Transparent - 透明代理",
            dnsDefault: "默认",
            dnsPrefer4: "优先IPv4",
            dnsPrefer6: "优先IPv6",
            dns4Only: "仅IPv4",
            dns6Only: "仅IPv6",
            sniDefault: "默认",
            sniRandom: "随机",
            sniPreserve: "保留",
            sniDisable: "禁用",
            certDefault: "默认（系统）",
            certStrict: "严格真实",
            certNames: "允许域名",
            certSuffixes: "允许后缀",
            certSpki: "允许SPKI",
            certChain: "仅链式"
        }
    };

    function updateUI() {
        const t = i18n[currentLang];
        document.getElementById('back-text').textContent = t.back;
        document.getElementById('page-title').textContent = t.title;
        document.getElementById('section-basic').textContent = t.basicInfo;
        document.getElementById('label-name').textContent = t.name;
        document.getElementById('label-website').textContent = t.website;
        document.getElementById('label-mode').textContent = t.mode;
        document.getElementById('label-enabled').textContent = t.enabled;
        document.getElementById('section-domains').textContent = t.domains;
        document.getElementById('label-domains').textContent = t.domainsLabel;
        document.getElementById('section-upstream').textContent = t.upstream;
        document.getElementById('label-upstream').textContent = t.upstreamLabel;
        document.getElementById('label-dns').textContent = t.dns;
        document.getElementById('section-sni').textContent = t.sni;
        document.getElementById('label-sni-fake').textContent = t.sniFake;
        document.getElementById('label-sni-policy').textContent = t.sniPolicy;
        document.getElementById('section-ech').textContent = t.ech;
        document.getElementById('label-ech-enabled').textContent = t.echEnabled;
        document.getElementById('label-ech-profile').textContent = t.echProfile;
        document.getElementById('label-ech-domain').textContent = t.echDomain;
        document.getElementById('section-cf').textContent = t.cf;
        document.getElementById('label-use-cf').textContent = t.useCf;
        document.getElementById('section-cert').textContent = t.cert;
        document.getElementById('label-cert-mode').textContent = t.certMode;
        document.getElementById('label-cert-names').textContent = t.certNames;
        document.getElementById('label-cert-suffixes').textContent = t.certSuffixes;
        document.getElementById('label-cert-spki').textContent = t.certSpki;
        document.getElementById('label-cert-unknown').textContent = t.certUnknown;
        document.getElementById('btn-save').querySelector('span:last-child').textContent = t.save;
        document.getElementById('btn-cancel').querySelector('span:last-child').textContent = t.cancel;
        
        // Update select options
        updateSelectOptions('mode', [
            {value: 'mitm', text: t.modeMitm},
            {value: 'server', text: t.modeServer},
            {value: 'tls-rf', text: t.modeTlsRf},
            {value: 'quic', text: t.modeQuic},
            {value: 'transparent', text: t.modeTransparent}
        ]);
        updateSelectOptions('dns_mode', [
            {value: '', text: t.dnsDefault},
            {value: 'prefer_ipv4', text: t.dnsPrefer4},
            {value: 'prefer_ipv6', text: t.dnsPrefer6},
            {value: 'ipv4_only', text: t.dns4Only},
            {value: 'ipv6_only', text: t.dns6Only}
        ]);
        updateSelectOptions('sni_policy', [
            {value: '', text: t.sniDefault},
            {value: 'random', text: t.sniRandom},
            {value: 'preserve', text: t.sniPreserve},
            {value: 'disable', text: t.sniDisable}
        ]);
        updateSelectOptions('cert_verify_mode', [
            {value: '', text: t.certDefault},
            {value: 'strict_real', text: t.certStrict},
            {value: 'allow_names', text: t.certNames},
            {value: 'allow_suffixes', text: t.certSuffixes},
            {value: 'allow_spki', text: t.certSpki},
            {value: 'chain_only', text: t.certChain}
        ]);
        
        document.getElementById('btn-en').className = 'lang-btn' + (currentLang === 'en' ? ' active' : '');
        document.getElementById('btn-zh').className = 'lang-btn' + (currentLang === 'zh' ? ' active' : '');
    }

    function updateSelectOptions(id, options) {
        const select = document.getElementById(id);
        const currentValue = select.value;
        select.innerHTML = options.map(o => '<option value="' + o.value + '">' + o.text + '</option>').join('');
        select.value = currentValue;
    }

    // Show/hide sections based on mode
    function updateModeVisibility() {
        const mode = document.getElementById('mode').value;
        const sniCard = document.getElementById('sni-card');
        const echCard = document.getElementById('ech-card');
        const certCard = document.getElementById('cert-card');
        
        // SNI: mitm, quic
        sniCard.style.display = ['mitm', 'quic'].includes(mode) ? 'block' : 'none';
        // ECH: mitm, server, quic
        echCard.style.display = ['mitm', 'server', 'quic'].includes(mode) ? 'block' : 'none';
        // Cert: mitm, quic
        certCard.style.display = ['mitm', 'quic'].includes(mode) ? 'block' : 'none';
    }

    // Show/hide ECH config
    document.getElementById('ech_enabled').addEventListener('change', function() {
        document.getElementById('ech-config').style.display = this.checked ? 'block' : 'none';
    });

    // Show/hide cert config
    document.getElementById('cert_verify_mode').addEventListener('change', function() {
        const mode = this.value;
        const certConfig = document.getElementById('cert-config');
        const namesGroup = document.getElementById('cert-names-group');
        const suffixesGroup = document.getElementById('cert-suffixes-group');
        const spkiGroup = document.getElementById('cert-spki-group');
        
        certConfig.style.display = mode ? 'block' : 'none';
        namesGroup.style.display = mode === 'allow_names' ? 'block' : 'none';
        suffixesGroup.style.display = mode === 'allow_suffixes' ? 'block' : 'none';
        spkiGroup.style.display = mode === 'allow_spki' ? 'block' : 'none';
    });

    document.getElementById('mode').addEventListener('change', updateModeVisibility);

    // Load ECH profiles
    function loadECHProfiles() {
        fetch('/ech', {headers: {'Accept': 'application/json'}})
            .then(r => r.json())
            .then(data => {
                const select = document.getElementById('ech_profile_id');
                const currentValue = select.value;
                let options = '<option value="">Select Profile...</option>';
                if (data.profiles) {
                    options += data.profiles.map(p => '<option value="' + p.id + '">' + (p.name || p.id) + '</option>').join('');
                }
                select.innerHTML = options;
                select.value = currentValue;
            });
    }

    // Form submit
    document.getElementById('rule-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const certMode = document.getElementById('cert_verify_mode').value;
        const certVerify = certMode ? {
            mode: certMode,
            names: certMode === 'allow_names' ? document.getElementById('cert_names').value.split('\n').map(s => s.trim()).filter(s => s) : [],
            suffixes: certMode === 'allow_suffixes' ? document.getElementById('cert_suffixes').value.split('\n').map(s => s.trim()).filter(s => s) : [],
            spki_sha256: certMode === 'allow_spki' ? document.getElementById('cert_spki').value.split('\n').map(s => s.trim()).filter(s => s) : [],
            allow_unknown_authority: document.getElementById('cert_allow_unknown').checked
        } : null;
        
        const rule = {
            name: document.getElementById('name').value,
            website: document.getElementById('website').value,
            mode: document.getElementById('mode').value,
            enabled: document.getElementById('enabled').checked,
            domains: document.getElementById('domains').value.split('\n').map(d => d.trim()).filter(d => d),
            upstream: document.getElementById('upstream').value,
            dns_mode: document.getElementById('dns_mode').value,
            sni_fake: document.getElementById('sni_fake').value,
            sni_policy: document.getElementById('sni_policy').value,
            ech_enabled: document.getElementById('ech_enabled').checked,
            ech_profile_id: document.getElementById('ech_profile_id').value,
            ech_domain: document.getElementById('ech_domain').value,
            use_cf_pool: document.getElementById('use_cf_pool').checked,
            cert_verify: certVerify
        };
        
        fetch('/rules', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(rule)
        }).then(() => window.location.href = '/rules');
    });

    function initPage() {
        updateModeVisibility();
        loadECHProfiles();
    }
</script>
{{end}}
