{{define "content"}}
<a href="/" class="back-link">
    <span class="iconify" data-icon="ph:caret-left-bold"></span>
    <span id="back-text">Back</span>
</a>

<h1 id="page-title">Proxies</h1>

<div class="form-grid">
    <div class="card">
        <div class="card-title">
            <span class="iconify" data-icon="ph:server-bold"></span>
            <span id="section-server">Server Node</span>
        </div>
        <div style="display: grid; gap: 20px;">
            <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label" id="label-host">Node Host</label>
                <input type="text" class="form-input" id="server-host" placeholder="proxy.yourdomain.workers.dev">
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label" id="label-auth">Auth Secret</label>
                <input type="password" class="form-input" id="server-auth" placeholder="Enter authentication key">
            </div>
            <div style="display: flex; gap: 12px;">
                <button class="btn-sci" onclick="saveServerConfig()" id="btn-save-server" style="flex: 1;">
                    <span class="iconify" data-icon="ph:floppy-disk-bold"></span>
                    <span id="btn-save-text">Save Node</span>
                </button>
                <button class="btn-sci secondary" onclick="testServer()" id="btn-test">
                    <span class="iconify" data-icon="ph:activity-bold"></span>
                    <span id="btn-test-text">Test Connection</span>
                </button>
            </div>
            <div id="test-result" style="display: none; padding: 12px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; text-align: center;">
                <span id="test-result-text"></span>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">
            <span class="iconify" data-icon="ph:info-bold"></span>
            <span id="section-info">Node Info</span>
        </div>
        <div style="display: grid; gap: 16px;">
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255, 255, 255, 0.03); border-radius: 12px;">
                <span style="color: var(--text-secondary); font-size: 0.9rem;" id="label-status">Status</span>
                <span class="status-badge status-disabled" id="badge-server-status">Not Tested</span>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255, 255, 255, 0.03); border-radius: 12px;">
                <span style="color: var(--text-secondary); font-size: 0.9rem;" id="label-latency">Latency</span>
                <span style="font-family: 'Orbitron', monospace; font-size: 1rem; color: var(--accent-orange);" id="text-latency">-</span>
            </div>
        </div>
    </div>
</div>

<div class="section-divider"></div>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <div class="card-title" style="margin-bottom: 0;">
            <span class="iconify" data-icon="ph:shield-check-bold"></span>
            <span id="section-ech">ECH Profiles</span>
        </div>
        <button class="btn-sci" onclick="addECHProfile()" id="btn-add-ech">
            <span class="iconify" data-icon="ph:plus-bold"></span>
            <span id="btn-add-text">Add ECH</span>
        </button>
    </div>

    <div id="ech-list" class="item-list">
        <div class="empty-state">
            <span class="iconify" data-icon="ph:shield-bold"></span>
            <p id="loading-text">Loading...</p>
        </div>
    </div>
</div>

<div id="ech-modal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 600px;">
        <div class="modal-header">
            <h2 id="modal-title">Add ECH Profile</h2>
            <button class="modal-close" onclick="closeECHModal()">&times;</button>
        </div>
        <div class="modal-body">
            <form id="ech-form">
                <input type="hidden" id="ech-id">
                <div class="form-group">
                    <label for="ech-name" id="label-name">Profile Name</label>
                    <input type="text" class="form-input" id="ech-name" required>
                </div>
                <div class="form-group">
                    <label for="ech-public-key" id="label-public-key">Public Key (Base64)</label>
                    <textarea class="form-textarea" id="ech-public-key" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label for="ech-config" id="label-config">ECH Config (Base64)</label>
                    <textarea class="form-textarea" id="ech-config" rows="3" required></textarea>
                </div>
                <label class="form-checkbox">
                    <input type="checkbox" id="ech-auto-update">
                    <span id="label-auto-update">Auto Update</span>
                </label>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn-sci secondary" onclick="closeECHModal()" id="btn-cancel">Cancel</button>
            <button class="btn-sci" onclick="saveECHProfile()" id="btn-save-ech">Save</button>
        </div>
    </div>
</div>
{{end}}

{{define "scripts"}}
<style>
    .modal {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }
    .modal-content {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 30px;
        max-width: 500px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
    }
    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
    }
    .modal-header h2 {
        font-family: 'Orbitron', monospace;
        font-size: 1.2rem;
        color: var(--accent-orange);
    }
    .modal-close {
        background: none;
        border: none;
        color: var(--text-secondary);
        font-size: 1.5rem;
        cursor: pointer;
    }
    .modal-body {
        margin-bottom: 24px;
    }
    .modal-footer {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
    }
    .item-card .item-tags {
        display: flex;
        gap: 8px;
        margin-top: 12px;
    }
    .tag {
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 0.7rem;
        font-family: 'Orbitron', monospace;
        text-transform: uppercase;
    }
    .tag-ech {
        background: rgba(34, 197, 94, 0.2);
        color: #22c55e;
        border: 1px solid rgba(34, 197, 94, 0.4);
    }
    .tag-auto {
        background: rgba(255, 140, 0, 0.2);
        color: var(--accent-orange);
        border: 1px solid rgba(255, 140, 0, 0.4);
    }
</style>

<script>
    const i18n = {
        en: {
            back: "Back",
            title: "Proxies",
            serverNode: "Server Node",
            nodeHost: "Node Host",
            authSecret: "Auth Secret",
            saveNode: "Save Node",
            testConn: "Test Connection",
            testing: "Testing...",
            nodeInfo: "Node Info",
            status: "Status",
            latency: "Latency",
            notTested: "Not Tested",
            success: "Success",
            failed: "Failed",
            echProfiles: "ECH Profiles",
            addECH: "Add ECH",
            editECH: "Edit ECH",
            loading: "Loading...",
            noECH: "No ECH profiles configured",
            profileName: "Profile Name",
            publicKey: "Public Key (Base64)",
            echConfig: "ECH Config (Base64)",
            autoUpdate: "Auto Update",
            cancel: "Cancel",
            save: "Save",
            confirmDelete: "Are you sure you want to delete this ECH profile?",
            saved: "Profile saved successfully",
            deleted: "Profile deleted",
            testSuccess: "Connection successful",
            testFailed: "Connection failed"
        },
        zh: {
            back: "返回",
            title: "代理节点",
            serverNode: "服务器节点",
            nodeHost: "节点地址",
            authSecret: "认证密钥",
            saveNode: "保存节点",
            testConn: "测试连接",
            testing: "测试中...",
            nodeInfo: "节点信息",
            status: "状态",
            latency: "延迟",
            notTested: "未测试",
            success: "成功",
            failed: "失败",
            echProfiles: "ECH 配置",
            addECH: "添加 ECH",
            editECH: "编辑 ECH",
            loading: "加载中...",
            noECH: "未配置 ECH 配置",
            profileName: "配置名称",
            publicKey: "公钥 (Base64)",
            echConfig: "ECH 配置 (Base64)",
            autoUpdate: "自动更新",
            cancel: "取消",
            save: "保存",
            confirmDelete: "确定要删除此 ECH 配置吗？",
            saved: "配置保存成功",
            deleted: "配置已删除",
            testSuccess: "连接成功",
            testFailed: "连接失败"
        }
    };

    let echProfiles = [];
    let serverConfig = { host: '', auth: '' };

    function updateUI() {
        const t = i18n[currentLang];
        document.getElementById('back-text').textContent = t.back;
        document.getElementById('page-title').textContent = t.title;
        document.getElementById('section-server').textContent = t.serverNode;
        document.getElementById('label-host').textContent = t.nodeHost;
        document.getElementById('label-auth').textContent = t.authSecret;
        document.getElementById('btn-save-text').textContent = t.saveNode;
        document.getElementById('btn-test-text').textContent = t.testConn;
        document.getElementById('section-info').textContent = t.nodeInfo;
        document.getElementById('label-status').textContent = t.status;
        document.getElementById('label-latency').textContent = t.latency;
        document.getElementById('section-ech').textContent = t.echProfiles;
        document.getElementById('btn-add-text').textContent = t.addECH;
        document.getElementById('btn-en').className = 'lang-btn' + (currentLang === 'en' ? ' active' : '');
        document.getElementById('btn-zh').className = 'lang-btn' + (currentLang === 'zh' ? ' active' : '');
    }

    async function loadProxies() {
        try {
            const [serverRes, echRes] = await Promise.all([
                fetch('/server/config', {headers: {'Accept': 'application/json'}}).then(r => r.json()).catch(() => ({host: '', auth: ''})),
                fetch('/ech/profiles', {headers: {'Accept': 'application/json'}}).then(r => r.json()).then(d => d.profiles || []).catch(() => [])
            ]);

            serverConfig = serverRes;
            echProfiles = echRes;

            document.getElementById('server-host').value = serverConfig.host || '';
            document.getElementById('server-auth').value = serverConfig.auth || '';

            renderECHList();
        } catch (e) {
            console.error("Failed to load proxies:", e);
        }
    }

    function renderECHList() {
        const container = document.getElementById('ech-list');
        const t = i18n[currentLang];

        if (echProfiles.length === 0) {
            container.innerHTML = '<div class="empty-state"><span class="iconify" data-icon="ph:shield-bold"></span><p>' + t.noECH + '</p></div>';
            return;
        }

        container.innerHTML = echProfiles.map(profile => `
            <div class="item-card">
                <div>
                    <div class="item-name">${profile.name || 'Unnamed'}</div>
                    <div style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 4px; font-family: monospace;">
                        ${(profile.public_key || '').substring(0, 40)}...
                    </div>
                    <div class="item-tags">
                        <span class="tag tag-ech">ECH</span>
                        ${profile.auto_update ? '<span class="tag tag-auto">Auto Update</span>' : ''}
                    </div>
                </div>
                <div class="item-actions">
                    <button class="btn-icon" onclick="editECHProfile('${profile.id}')" title="Edit">
                        <span class="iconify" data-icon="ph:pencil-bold"></span>
                    </button>
                    <button class="btn-icon delete" onclick="deleteECHProfile('${profile.id}')" title="Delete">
                        <span class="iconify" data-icon="ph:trash-bold"></span>
                    </button>
                </div>
            </div>
        `).join('');
    }

    async function saveServerConfig() {
        const host = document.getElementById('server-host').value;
        const auth = document.getElementById('server-auth').value;

        try {
            await fetch('/server/config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({host, auth})
            });
            alert(i18n[currentLang].saved);
        } catch (e) {
            alert('Error: ' + e);
        }
    }

    async function testServer() {
        const t = i18n[currentLang];
        const btn = document.getElementById('btn-test');
        const resultDiv = document.getElementById('test-result');
        const resultText = document.getElementById('test-result-text');

        btn.disabled = true;
        document.getElementById('btn-test-text').textContent = t.testing;

        try {
            const res = await fetch('/server/test', {method: 'POST'});
            const data = await res.json();

            resultDiv.style.display = 'block';
            if (data.success) {
                resultText.textContent = t.testSuccess + ' - ' + (data.latency || '-') + 'ms';
                resultText.style.color = '#22c55e';
                document.getElementById('badge-server-status').textContent = t.success;
                document.getElementById('badge-server-status').className = 'status-badge status-enabled';
                document.getElementById('text-latency').textContent = (data.latency || '-') + 'ms';
            } else {
                resultText.textContent = t.testFailed + ': ' + (data.error || 'Unknown error');
                resultText.style.color = '#ef4444';
                document.getElementById('badge-server-status').textContent = t.failed;
                document.getElementById('badge-server-status').className = 'status-badge status-disabled';
            }
        } catch (e) {
            resultDiv.style.display = 'block';
            resultText.textContent = t.testFailed + ': ' + e;
            resultText.style.color = '#ef4444';
        } finally {
            btn.disabled = false;
            document.getElementById('btn-test-text').textContent = t.testConn;
        }
    }

    function addECHProfile() {
        const t = i18n[currentLang];
        document.getElementById('modal-title').textContent = t.addECH;
        document.getElementById('ech-form').reset();
        document.getElementById('ech-id').value = '';
        document.getElementById('ech-modal').style.display = 'flex';
    }

    function editECHProfile(id) {
        const t = i18n[currentLang];
        const profile = echProfiles.find(p => p.id === id);
        if (!profile) return;

        document.getElementById('modal-title').textContent = t.editECH;
        document.getElementById('ech-id').value = profile.id;
        document.getElementById('ech-name').value = profile.name || '';
        document.getElementById('ech-public-key').value = profile.public_key || '';
        document.getElementById('ech-config').value = profile.config || '';
        document.getElementById('ech-auto-update').checked = profile.auto_update || false;
        document.getElementById('ech-modal').style.display = 'flex';
    }

    function closeECHModal() {
        document.getElementById('ech-modal').style.display = 'none';
    }

    async function saveECHProfile() {
        const t = i18n[currentLang];
        const id = document.getElementById('ech-id').value;
        const profile = {
            id: id,
            name: document.getElementById('ech-name').value,
            public_key: document.getElementById('ech-public-key').value,
            config: document.getElementById('ech-config').value,
            auto_update: document.getElementById('ech-auto-update').checked
        };

        try {
            const method = id ? 'PUT' : 'POST';
            await fetch('/ech/profiles', {
                method: method,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(profile)
            });
            alert(t.saved);
            closeECHModal();
            loadProxies();
        } catch (e) {
            alert('Error: ' + e);
        }
    }

    async function deleteECHProfile(id) {
        const t = i18n[currentLang];
        if (!confirm(t.confirmDelete)) return;

        try {
            await fetch('/ech/profiles?id=' + id, {method: 'DELETE'});
            alert(t.deleted);
            loadProxies();
        } catch (e) {
            alert('Error: ' + e);
        }
    }

    function initPage() {
        loadProxies();
        setInterval(loadProxies, 3000);
    }
</script>
{{end}}
