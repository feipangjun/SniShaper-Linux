{{define "content"}}
<a href="/" class="back-link">
    <span class="iconify" data-icon="ph:caret-left-bold"></span>
    <span id="back-text">Back</span>
</a>

<h1 id="page-title">DNS</h1>

<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
    <div>
        <p style="color: var(--text-secondary); font-size: 0.9rem;" id="dns-desc">Manage DNS-over-HTTPS nodes with ECH support</p>
    </div>
    <div style="display: flex; gap: 12px;">
        <button class="btn-sci secondary" onclick="testAllNodes()" id="btn-test-all">
            <span class="iconify" data-icon="ph:lightning-bold"></span>
            <span id="btn-test-all-text">Test All</span>
        </button>
        <button class="btn-sci" onclick="addNode()" id="btn-add">
            <span class="iconify" data-icon="ph:plus-bold"></span>
            <span id="btn-add-text">Add Node</span>
        </button>
    </div>
</div>

<div class="card" style="padding: 0; overflow: hidden;">
    <div id="nodes-list">
        <div class="empty-state" style="padding: 60px 20px;">
            <span class="iconify" data-icon="ph:antenna-bold" style="font-size: 3rem;"></span>
            <p id="loading-text" style="margin-top: 16px;">Loading...</p>
        </div>
    </div>
</div>

<div id="node-modal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 700px;">
        <div class="modal-header">
            <h2 id="modal-title">Add DNS Node</h2>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body">
            <form id="node-form">
                <input type="hidden" id="node-id">
                <div class="form-grid" style="margin-bottom: 20px;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label for="node-name" class="form-label" id="label-name">Node Name</label>
                        <input type="text" class="form-input" id="node-name" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label for="node-url" class="form-label" id="label-url">DoH URL</label>
                        <input type="url" class="form-input" id="node-url" placeholder="https://dns.example.com/dns-query" required>
                    </div>
                </div>
                <div class="form-grid" style="margin-bottom: 20px;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label for="node-sni" class="form-label" id="label-sni">SNI (Optional)</label>
                        <input type="text" class="form-input" id="node-sni" placeholder="Frontend SNI">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label for="node-ips" class="form-label" id="label-ips">Bootstrap IPs</label>
                        <textarea class="form-input" id="node-ips" rows="2" placeholder="1.1.1.1&#10;1.0.0.1" style="resize: vertical; font-family: monospace;"></textarea>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px;">
                    <label class="form-checkbox" style="padding: 12px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; border: 1px solid var(--border);">
                        <input type="checkbox" id="node-enabled" checked>
                        <span id="label-enabled">Enabled</span>
                    </label>
                    <label class="form-checkbox" style="padding: 12px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; border: 1px solid var(--border);">
                        <input type="checkbox" id="node-ech">
                        <span>ECH</span>
                    </label>
                    <label class="form-checkbox" style="padding: 12px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; border: 1px solid var(--border);">
                        <input type="checkbox" id="node-quic">
                        <span>QUIC</span>
                    </label>
                </div>

                <div style="padding: 16px; background: rgba(255, 193, 7, 0.05); border: 1px solid rgba(255, 193, 7, 0.3); border-radius: 16px; margin-bottom: 20px;">
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px; color: #ffc107;">
                        <span class="iconify" data-icon="ph:shield-warning-bold"></span>
                        <span style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em;" id="label-cert-policy">Certificate Policy</span>
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 12px;">
                        <label for="cert-verify-mode" class="form-label" id="label-verify-mode">Verify Mode</label>
                        <select class="form-input" id="cert-verify-mode">
                            <option value="">Default</option>
                            <option value="strict_real">Strict Real</option>
                            <option value="allow_names">Allow Names</option>
                            <option value="allow_suffixes">Allow Suffixes</option>
                            <option value="allow_spki">Allow SPKI</option>
                            <option value="chain_only">Chain Only</option>
                        </select>
                    </div>

                    <label class="form-checkbox" style="margin-bottom: 12px;">
                        <input type="checkbox" id="cert-allow-unknown">
                        <span id="label-allow-unknown">Allow Unknown Authority</span>
                    </label>

                    <div class="form-group" id="cert-names-group" style="display: none; margin-bottom: 0;">
                        <label for="cert-names" class="form-label" id="label-cert-names">Allowed Names</label>
                        <textarea class="form-input" id="cert-names" rows="2" placeholder="example.com&#10;*.example.com" style="resize: vertical;"></textarea>
                    </div>

                    <div class="form-group" id="cert-suffixes-group" style="display: none; margin-bottom: 0;">
                        <label for="cert-suffixes" class="form-label" id="label-cert-suffixes">Allowed Suffixes</label>
                        <textarea class="form-input" id="cert-suffixes" rows="2" placeholder=".example.com&#10;.test.com" style="resize: vertical;"></textarea>
                    </div>

                    <div class="form-group" id="cert-spki-group" style="display: none; margin-bottom: 0;">
                        <label for="cert-spki" class="form-label" id="label-cert-spki">SPKI SHA256 Hashes</label>
                        <textarea class="form-input" id="cert-spki" rows="2" placeholder="Base64 encoded SPKI hashes" style="resize: vertical;"></textarea>
                    </div>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn-sci secondary" onclick="closeModal()" id="btn-cancel">Cancel</button>
            <button class="btn-sci" onclick="saveNode()" id="btn-save">Save</button>
        </div>
    </div>
</div>
{{end}}

{{define "scripts"}}
<style>
    .modal {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }
    .modal-content {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 30px;
        max-width: 500px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
    }
    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
    }
    .modal-header h2 {
        font-family: 'Orbitron', monospace;
        font-size: 1.2rem;
        color: var(--accent-orange);
    }
    .modal-close {
        background: none;
        border: none;
        color: var(--text-secondary);
        font-size: 1.5rem;
        cursor: pointer;
    }
    .modal-body {
        margin-bottom: 24px;
    }
    .modal-footer {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
    }
    .dns-node-item {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 24px;
        border-bottom: 1px solid var(--border);
        transition: all 0.3s;
    }
    .dns-node-item:last-child {
        border-bottom: none;
    }
    .dns-node-item:hover {
        background: rgba(255, 255, 255, 0.03);
    }
    .node-priority {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
    }
    .node-priority button {
        background: none;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        padding: 4px;
        border-radius: 4px;
        transition: all 0.3s;
    }
    .node-priority button:hover:not(:disabled) {
        color: var(--accent-orange);
        background: rgba(255, 140, 0, 0.1);
    }
    .node-priority button:disabled {
        opacity: 0.2;
        cursor: not-allowed;
    }
    .node-priority span {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-secondary);
    }
    .node-info {
        flex: 1;
        min-width: 0;
    }
    .node-info h3 {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 1rem;
        margin-bottom: 4px;
    }
    .node-status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
    }
    .node-status-dot.enabled {
        background: #22c55e;
        box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
    }
    .node-status-dot.disabled {
        background: var(--text-secondary);
        opacity: 0.3;
    }
    .node-url {
        font-size: 0.85rem;
        color: var(--text-secondary);
        font-family: monospace;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .node-tags {
        display: flex;
        gap: 8px;
        margin-top: 8px;
        flex-wrap: wrap;
    }
    .node-tag {
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        border: 1px solid;
    }
    .node-tag.ech {
        background: rgba(34, 211, 238, 0.1);
        color: #22d3ee;
        border-color: rgba(34, 211, 238, 0.3);
    }
    .node-tag.quic {
        background: rgba(168, 85, 247, 0.1);
        color: #a855f7;
        border-color: rgba(168, 85, 247, 0.3);
    }
    .node-tag.sni {
        background: rgba(255, 140, 0, 0.1);
        color: var(--accent-orange);
        border-color: rgba(255, 140, 0, 0.3);
    }
    .node-tag.verify {
        background: rgba(255, 193, 7, 0.1);
        color: #ffc107;
        border-color: rgba(255, 193, 7, 0.3);
    }
    .node-tag.unknown {
        background: rgba(239, 68, 68, 0.1);
        color: #ef4444;
        border-color: rgba(239, 68, 68, 0.3);
    }
    .node-ips {
        display: flex;
        gap: 6px;
        margin-top: 6px;
        flex-wrap: wrap;
    }
    .node-ip {
        font-size: 0.7rem;
        font-family: monospace;
        padding: 2px 8px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-secondary);
    }
    .node-test-result {
        width: 120px;
        text-align: right;
        flex-shrink: 0;
    }
    .node-actions {
        display: flex;
        gap: 8px;
        flex-shrink: 0;
    }
    .node-actions button {
        padding: 8px 12px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-size: 0.75rem;
        font-weight: 600;
        transition: all 0.3s;
    }
    .btn-test {
        background: rgba(255, 140, 0, 0.1);
        color: var(--accent-orange);
    }
    .btn-test:hover {
        background: var(--accent-orange);
        color: #0a0a0f;
    }
    .btn-edit {
        background: transparent;
        color: var(--text-secondary);
    }
    .btn-edit:hover {
        color: var(--accent-orange);
        background: rgba(255, 140, 0, 0.1);
    }
    .btn-delete {
        background: transparent;
        color: #ef4444;
    }
    .btn-delete:hover {
        background: rgba(239, 68, 68, 0.1);
    }
</style>

<script>
    const i18n = {
        en: {
            back: "Back",
            title: "DNS",
            desc: "Manage DNS-over-HTTPS nodes with ECH support",
            testAll: "Test All",
            addNode: "Add Node",
            loading: "Loading...",
            noNodes: "No DNS nodes configured",
            edit: "Edit",
            delete: "Delete",
            test: "Test",
            modalAdd: "Add DNS Node",
            modalEdit: "Edit DNS Node",
            name: "Node Name",
            url: "DoH URL",
            sni: "SNI (Optional)",
            ips: "Bootstrap IPs",
            enabled: "Enabled",
            cancel: "Cancel",
            save: "Save",
            confirmDelete: "Are you sure you want to delete this node?",
            saved: "Node saved successfully",
            deleted: "Node deleted",
            testing: "Testing...",
            certPolicy: "Certificate Policy",
            verifyMode: "Verify Mode",
            allowUnknown: "Allow Unknown Authority",
            allowedNames: "Allowed Names",
            allowedSuffixes: "Allowed Suffixes",
            spkiHashes: "SPKI SHA256 Hashes",
            testSuccess: "Success",
            testFailed: "Failed"
        },
        zh: {
            back: "返回",
            title: "DNS",
            desc: "管理支持 ECH 的 DNS-over-HTTPS 节点",
            testAll: "全部测试",
            addNode: "添加节点",
            loading: "加载中...",
            noNodes: "未配置DNS节点",
            edit: "编辑",
            delete: "删除",
            test: "测试",
            modalAdd: "添加DNS节点",
            modalEdit: "编辑DNS节点",
            name: "节点名称",
            url: "DoH地址",
            sni: "SNI（可选）",
            ips: "引导IP",
            enabled: "启用",
            cancel: "取消",
            save: "保存",
            confirmDelete: "确定要删除此节点吗？",
            saved: "节点保存成功",
            deleted: "节点已删除",
            testing: "测试中...",
            certPolicy: "证书策略",
            verifyMode: "验证模式",
            allowUnknown: "允许未知颁发机构",
            allowedNames: "允许的名称",
            allowedSuffixes: "允许的后缀",
            spkiHashes: "SPKI SHA256哈希",
            testSuccess: "成功",
            testFailed: "失败"
        }
    };

    let nodes = [];
    let testResults = {};

    function updateUI() {
        const t = i18n[currentLang];
        document.getElementById('back-text').textContent = t.back;
        document.getElementById('page-title').textContent = t.title;
        document.getElementById('dns-desc').textContent = t.desc;
        document.getElementById('btn-test-all-text').textContent = t.testAll;
        document.getElementById('btn-add-text').textContent = t.addNode;
        document.getElementById('btn-en').className = 'lang-btn' + (currentLang === 'en' ? ' active' : '');
        document.getElementById('btn-zh').className = 'lang-btn' + (currentLang === 'zh' ? ' active' : '');
    }

    function loadNodes() {
        fetch('/dns', { headers: { 'Accept': 'application/json' } })
            .then(res => res.json())
            .then(data => {
                nodes = data.nodes || [];
                renderNodes();
            })
            .catch(err => {
                console.error('Failed to load nodes:', err);
                document.getElementById('nodes-list').innerHTML = '<div class="empty-state"><p>Failed to load</p></div>';
            });
    }

    function renderNodes() {
        const container = document.getElementById('nodes-list');
        const t = i18n[currentLang];

        if (nodes.length === 0) {
            container.innerHTML = '<div class="empty-state" style="padding: 60px 20px;"><span class="iconify" data-icon="ph:antenna-bold" style="font-size: 3rem;"></span><p style="margin-top: 16px; color: var(--text-secondary); opacity: 0.5; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.85rem;">' + t.noNodes + '</p></div>';
            return;
        }

        container.innerHTML = nodes.map((node, index) => {
            const tags = [];
            if (node.ech_enabled) tags.push('<span class="node-tag ech"><span class="iconify" data-icon="ph:lock-key-bold" style="color: #22d3ee;"></span> ECH</span>');
            if (node.quic) tags.push('<span class="node-tag quic"><span class="iconify" data-icon="ph:zap-bold" style="color: #a855f7;"></span> QUIC</span>');
            if (node.sni) tags.push('<span class="node-tag sni"><span class="iconify" data-icon="ph:shield-bold" style="color: var(--accent-orange);"></span> SNI: ' + node.sni + '</span>');
            
            const vMode = node.cert_verify?.mode;
            if (vMode) {
                const modeLabels = {'': 'Default', 'strict_real': 'Strict', 'allow_names': 'Names', 'allow_suffixes': 'Suffixes', 'allow_spki': 'SPKI', 'chain_only': 'Chain'};
                tags.push('<span class="node-tag verify"><span class="iconify" data-icon="ph:shield-check-bold" style="color: #ffc107;"></span> Verify: ' + (modeLabels[vMode] || vMode) + '</span>');
            }
            if (node.cert_verify?.allow_unknown_authority) {
                tags.push('<span class="node-tag unknown"><span class="iconify" data-icon="ph:shield-warning-bold" style="color: #ef4444;"></span> Unknown Auth</span>');
            }

            const testResult = testResults[node.id];
            let testHtml = '';
            if (testResult) {
                if (testResult.success) {
                    testHtml = '<div style="color: #22c55e; font-size: 0.85rem;">' + testResult.latency + 'ms</div>';
                } else {
                    testHtml = '<div style="color: #ef4444; font-size: 0.85rem;" title="' + (testResult.error || '') + '">' + t.testFailed + '</div>';
                }
            }

            return `
                <div class="dns-node-item">
                    <div class="node-priority">
                        <button onclick="moveNode('${node.id}', ${index - 1})" ${index === 0 ? 'disabled' : ''}>
                            <span class="iconify" data-icon="ph:caret-up-bold"></span>
                        </button>
                        <span>${index + 1}</span>
                        <button onclick="moveNode('${node.id}', ${index + 1})" ${index === nodes.length - 1 ? 'disabled' : ''}>
                            <span class="iconify" data-icon="ph:caret-down-bold"></span>
                        </button>
                    </div>
                    <div class="node-info">
                        <h3>
                            <span class="node-status-dot ${node.enabled ? 'enabled' : 'disabled'}"></span>
                            ${node.name || 'Unknown'}
                        </h3>
                        <div class="node-url">${node.url}</div>
                        ${tags.length > 0 ? '<div class="node-tags">' + tags.join('') + '</div>' : ''}
                        ${node.ips && node.ips.length > 0 ? '<div class="node-ips">' + node.ips.map(ip => '<span class="node-ip">' + ip + '</span>').join('') + '</div>' : ''}
                    </div>
                    <div class="node-test-result">
                        ${testHtml}
                    </div>
                    <div class="node-actions">
                        <button class="btn-test" onclick="testNode('${node.id}')">${t.test}</button>
                        <button class="btn-edit" onclick="editNode('${node.id}')">
                            <span class="iconify" data-icon="ph:pencil-bold"></span>
                        </button>
                        <button class="btn-delete" onclick="deleteNode('${node.id}')">
                            <span class="iconify" data-icon="ph:trash-bold"></span>
                        </button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function addNode() {
        const t = i18n[currentLang];
        document.getElementById('modal-title').textContent = t.modalAdd;
        document.getElementById('node-form').reset();
        document.getElementById('node-id').value = '';
        document.getElementById('node-enabled').checked = true;
        document.getElementById('node-modal').style.display = 'flex';
    }

    function editNode(id) {
        const t = i18n[currentLang];
        const node = nodes.find(n => n.id === id);
        if (!node) return;

        document.getElementById('modal-title').textContent = t.modalEdit;
        document.getElementById('node-id').value = node.id;
        document.getElementById('node-name').value = node.name;
        document.getElementById('node-url').value = node.url;
        document.getElementById('node-sni').value = node.sni || '';
        document.getElementById('node-ips').value = (node.ips || []).join('\n');
        document.getElementById('node-ech').checked = node.ech_enabled;
        document.getElementById('node-quic').checked = node.quic;
        document.getElementById('node-enabled').checked = node.enabled;

        const cv = node.cert_verify || {};
        document.getElementById('cert-verify-mode').value = cv.mode || '';
        document.getElementById('cert-allow-unknown').checked = cv.allow_unknown_authority || false;
        document.getElementById('cert-names').value = (cv.names || []).join('\n');
        document.getElementById('cert-suffixes').value = (cv.suffixes || []).join('\n');
        document.getElementById('cert-spki').value = (cv.spki_sha256 || []).join('\n');

        updateCertFields();
        document.getElementById('node-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('node-modal').style.display = 'none';
    }

    function updateCertFields() {
        const mode = document.getElementById('cert-verify-mode').value;
        document.getElementById('cert-names-group').style.display = mode === 'allow_names' ? 'block' : 'none';
        document.getElementById('cert-suffixes-group').style.display = mode === 'allow_suffixes' ? 'block' : 'none';
        document.getElementById('cert-spki-group').style.display = mode === 'allow_spki' ? 'block' : 'none';
    }

    function saveNode() {
        const t = i18n[currentLang];
        const id = document.getElementById('node-id').value;
        const ips = document.getElementById('node-ips').value.split(/[\n,;]+/).map(s => s.trim()).filter(Boolean);
        
        const certVerify = {
            mode: document.getElementById('cert-verify-mode').value,
            names: document.getElementById('cert-names').value.split(/[\n,;]+/).map(s => s.trim()).filter(Boolean),
            suffixes: document.getElementById('cert-suffixes').value.split(/[\n,;]+/).map(s => s.trim()).filter(Boolean),
            spki_sha256: document.getElementById('cert-spki').value.split(/[\n,;]+/).map(s => s.trim()).filter(Boolean),
            allow_unknown_authority: document.getElementById('cert-allow-unknown').checked
        };

        const node = {
            id: id,
            name: document.getElementById('node-name').value,
            url: document.getElementById('node-url').value,
            sni: document.getElementById('node-sni').value,
            ips: ips,
            ech_enabled: document.getElementById('node-ech').checked,
            quic: document.getElementById('node-quic').checked,
            enabled: document.getElementById('node-enabled').checked,
            cert_verify: certVerify
        };

        const method = id ? 'PUT' : 'POST';
        fetch('/dns', {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(node)
        })
        .then(res => res.json())
        .then(data => {
            alert(t.saved);
            closeModal();
            loadNodes();
        })
        .catch(err => alert('Error: ' + err));
    }

    function deleteNode(id) {
        const t = i18n[currentLang];
        if (!confirm(t.confirmDelete)) return;

        fetch('/dns?id=' + id, { method: 'DELETE' })
            .then(res => res.json())
            .then(data => {
                alert(t.deleted);
                loadNodes();
            })
            .catch(err => alert('Error: ' + err));
    }

    function moveNode(id, targetIndex) {
        fetch('/dns?id=' + id + '&target=' + targetIndex, { method: 'POST' })
            .then(res => res.json())
            .then(data => loadNodes())
            .catch(err => alert('Error: ' + err));
    }

    function testNode(id) {
        const t = i18n[currentLang];
        testResults[id] = { testing: true };
        renderNodes();

        fetch('/dns/test?id=' + id, { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                testResults[id] = data;
                renderNodes();
            })
            .catch(err => {
                testResults[id] = { success: false, error: String(err) };
                renderNodes();
            });
    }

    function testAllNodes() {
        nodes.forEach(node => testNode(node.id));
    }

    document.getElementById('cert-verify-mode').addEventListener('change', updateCertFields);

    function initPage() {
        loadNodes();
        updateUI();
    }
</script>
