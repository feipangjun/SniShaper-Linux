{{define "content"}}
<a href="/" class="back-link">
    <span class="iconify" data-icon="ph:caret-left-bold"></span>
    <span id="back-text">Back</span>
</a>

<h1 id="page-title">Upstream Proxies</h1>

<div class="toolbar">
    <button class="btn-sci" onclick="loadUpstreams()" id="refresh-btn">
        <span class="iconify" data-icon="ph:arrows-clockwise-bold"></span>
        <span>Refresh</span>
    </button>
    <button class="btn-sci" onclick="addUpstream()" id="add-btn">
        <span class="iconify" data-icon="ph:plus-bold"></span>
        <span id="add-text">Add Upstream</span>
    </button>
</div>

<div class="item-list" id="upstreams-list">
    <div class="empty-state">
        <span class="iconify" data-icon="ph:spinner-bold"></span>
        <p id="loading-text">Loading...</p>
    </div>
</div>

<div id="upstream-modal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-title">Add Upstream</h2>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body">
            <form id="upstream-form">
                <input type="hidden" id="upstream-id">
                <div class="form-group">
                    <label for="upstream-name" id="label-name">Name</label>
                    <input type="text" class="form-input" id="upstream-name" required>
                </div>
                <div class="form-group">
                    <label for="upstream-host" id="label-host">Host</label>
                    <input type="text" class="form-input" id="upstream-host" placeholder="proxy.example.com:443" required>
                </div>
                <div class="form-group">
                    <label for="upstream-sni" id="label-sni">SNI Policy</label>
                    <select class="form-input" id="upstream-sni">
                        <option value="">Default</option>
                        <option value="host">Use Host</option>
                        <option value="fake">Fake SNI</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="upstream-mode" id="label-mode">Mode</label>
                    <select class="form-input" id="upstream-mode">
                        <option value="mitm">MITM</option>
                        <option value="tls-rf">TLS-RF</option>
                        <option value="quic">QUIC</option>
                    </select>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn-sci secondary" onclick="closeModal()" id="btn-cancel">Cancel</button>
            <button class="btn-sci" onclick="saveUpstream()" id="btn-save">Save</button>
        </div>
    </div>
</div>
{{end}}

{{define "scripts"}}
<script>
    const i18n = {
        en: {
            back: "Back",
            title: "Upstream Proxies",
            refresh: "Refresh",
            add: "Add Upstream",
            loading: "Loading...",
            noUpstreams: "No upstream proxies configured",
            edit: "Edit",
            delete: "Delete",
            modalAdd: "Add Upstream",
            modalEdit: "Edit Upstream",
            name: "Name",
            host: "Host",
            sni: "SNI Policy",
            mode: "Mode",
            cancel: "Cancel",
            save: "Save",
            confirmDelete: "Are you sure you want to delete this upstream?",
            saved: "Upstream saved successfully",
            deleted: "Upstream deleted"
        },
        zh: {
            back: "返回",
            title: "上游代理",
            refresh: "刷新",
            add: "添加上游",
            loading: "加载中...",
            noUpstreams: "未配置上游代理",
            edit: "编辑",
            delete: "删除",
            modalAdd: "添加上游代理",
            modalEdit: "编辑上游代理",
            name: "名称",
            host: "主机地址",
            sni: "SNI策略",
            mode: "模式",
            cancel: "取消",
            save: "保存",
            confirmDelete: "确定要删除此上游吗？",
            saved: "上游保存成功",
            deleted: "上游已删除"
        }
    };

    let upstreams = [];

    function loadUpstreams() {
        fetch('/upstreams', { headers: { 'Accept': 'application/json' } })
            .then(res => res.json())
            .then(data => {
                upstreams = data.upstreams || [];
                renderUpstreams();
            })
            .catch(err => {
                console.error('Failed to load upstreams:', err);
                document.getElementById('upstreams-list').innerHTML = '<div class="empty-state"><p>Failed to load</p></div>';
            });
    }

    function renderUpstreams() {
        const container = document.getElementById('upstreams-list');
        if (upstreams.length === 0) {
            container.innerHTML = '<div class="empty-state"><span class="iconify" data-icon="ph:server-bold"></span><p>' + (currentLang === 'zh' ? i18n.zh.noUpstreams : i18n.en.noUpstreams) + '</p></div>';
            return;
        }

        container.innerHTML = upstreams.map(up => `
            <div class="card item-card">
                <div class="item-header">
                    <div>
                        <h3 class="item-title">${up.name}</h3>
                        <p class="item-subtitle">${up.host}</p>
                    </div>
                    <div class="item-actions">
                        <button class="btn-icon" onclick="editUpstream('${up.id}')" title="Edit"><span class="iconify" data-icon="ph:pencil-bold"></span></button>
                        <button class="btn-icon danger" onclick="deleteUpstream('${up.id}')" title="Delete"><span class="iconify" data-icon="ph:trash-bold"></span></button>
                    </div>
                </div>
                <div class="item-tags">
                    <span class="tag tag-mode">${up.mode || 'mitm'}</span>
                    ${up.sni ? `<span class="tag tag-sni">SNI: ${up.sni}</span>` : ''}
                </div>
            </div>
        `).join('');
    }

    function addUpstream() {
        document.getElementById('modal-title').textContent = currentLang === 'zh' ? i18n.zh.modalAdd : i18n.en.modalAdd;
        document.getElementById('upstream-form').reset();
        document.getElementById('upstream-id').value = '';
        document.getElementById('upstream-modal').style.display = 'flex';
    }

    function editUpstream(id) {
        const up = upstreams.find(u => u.id === id);
        if (!up) return;

        document.getElementById('modal-title').textContent = currentLang === 'zh' ? i18n.zh.modalEdit : i18n.en.modalEdit;
        document.getElementById('upstream-id').value = up.id;
        document.getElementById('upstream-name').value = up.name;
        document.getElementById('upstream-host').value = up.host;
        document.getElementById('upstream-sni').value = up.sni || '';
        document.getElementById('upstream-mode').value = up.mode || 'mitm';
        document.getElementById('upstream-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('upstream-modal').style.display = 'none';
    }

    function saveUpstream() {
        const id = document.getElementById('upstream-id').value;
        const upstream = {
            id: id,
            name: document.getElementById('upstream-name').value,
            host: document.getElementById('upstream-host').value,
            sni: document.getElementById('upstream-sni').value,
            mode: document.getElementById('upstream-mode').value
        };

        const method = id ? 'PUT' : 'POST';
        fetch('/upstreams', {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(upstream)
        })
        .then(res => res.json())
        .then(data => {
            alert(currentLang === 'zh' ? i18n.zh.saved : i18n.en.saved);
            closeModal();
            loadUpstreams();
        })
        .catch(err => alert('Error: ' + err));
    }

    function deleteUpstream(id) {
        if (!confirm(currentLang === 'zh' ? i18n.zh.confirmDelete : i18n.en.confirmDelete)) return;

        fetch('/upstreams?id=' + id, { method: 'DELETE' })
            .then(res => res.json())
            .then(data => {
                alert(currentLang === 'zh' ? i18n.zh.deleted : i18n.en.deleted);
                loadUpstreams();
            })
            .catch(err => alert('Error: ' + err));
    }

    function updateUI() {
        const t = i18n[currentLang];
        document.getElementById('back-text').textContent = t.back;
        document.getElementById('page-title').textContent = t.title;
        document.getElementById('refresh-btn span:last-child').textContent = t.refresh;
        document.getElementById('add-text').textContent = t.add;
        document.getElementById('loading-text').textContent = t.loading;
        document.getElementById('btn-cancel').textContent = t.cancel;
        document.getElementById('btn-save').textContent = t.save;
        document.getElementById('label-name').textContent = t.name;
        document.getElementById('label-host').textContent = t.host;
        document.getElementById('label-sni').textContent = t.sni;
        document.getElementById('label-mode').textContent = t.mode;
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadUpstreams();
        updateUI();
    });
</script>
{{end}}
